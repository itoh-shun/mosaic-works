name: dev-standard
version: "1"
description: 中規模タスク（FE+BE複合、3〜5サブタスク）向け15ステージ標準パイプライン。design→plan→Wave1/2並列実装(max_parallel=8)→ai-review/fix→quality→5軸review→save→PR。design-review/plan-review/arbitrate/UI verifyを省略。30〜45分目標。

inputs:
  - name: task
    type: string
    required: true

defaults:
  permission: acceptEdits

loop_monitors:
  - cycle: [ai-review, ai-fix]
    threshold: 3
    judge:
      persona: architect
      instruction: |
        ai-review → ai-fix のサイクルが {cycle_count} 回繰り返されました。
        各サイクルのレポートを確認し、品質が向上していれば「PRODUCTIVE」、
        同じ指摘が繰り返されているなら「UNPRODUCTIVE」と回答してください。
      decisions:
        - contains: "PRODUCTIVE"
          goto: ai-review
        - contains: "UNPRODUCTIVE"
          goto: quality-gate
  - cycle: [review, fix]
    threshold: 2
    judge:
      persona: architect
      instruction: |
        review → fix のサイクルが {cycle_count} 回繰り返されました。
        直近のレビュー指摘と修正内容を確認し、品質が向上していれば「PRODUCTIVE」、
        同じ指摘が繰り返されているなら「UNPRODUCTIVE」と回答してください。
      decisions:
        - contains: "PRODUCTIVE"
          goto: review
        - contains: "UNPRODUCTIVE"
          goto: save-results

stages:
  # Stage 1: 設計仕様（design-reviewなし）
  - id: design
    kind: task
    gate: approval
    facets:
      persona: architect
      knowledge: [team-roster, skill-catalog, mcp-catalog]
      instructions: [design-spec]
    input: ${workflow.inputs.task}
    output_contract: design-result
    permission: default

  # Stage 2: タスク計画（plan-reviewなし）
  - id: plan
    kind: task
    gate: approval
    facets:
      persona: architect
      knowledge: [team-roster, skill-catalog, mcp-catalog]
      instructions: [plan-tasks]
    input: |
      Task: ${workflow.inputs.task}
      Design: ${design.output}
    output_contract: plan-result
    permission: default

  # Stage 3: Issue + ブランチ作成
  - id: setup-git
    kind: task
    facets:
      persona: project-manager
      policies: [git-conventions]
      instructions: [setup-git-branch]
    input: |
      Task: ${workflow.inputs.task}
      Design: ${design.output}
    output_contract: git-setup

  # Stage 4: Worktree 作成
  - id: setup-worktree
    kind: task
    facets:
      persona: project-manager
      instructions: [setup-worktree]
    input: |
      Branch: ${setup-git.output.branch_name}
      Design: ${design.output}
    output_contract: worktree-setup

  # Stage 5: Wave1 並列実装
  - id: implement-wave1
    kind: fan_out
    from: ${plan.output.wave1_subtasks}
    as: subtask
    max_parallel: 8
    facets:
      persona: ${subtask.persona}
      policies: [coding-standards, no-push, tdd]
      knowledge: [error-patterns]
      instructions: [${subtask.instruction}]
    skills: ${subtask.skills}
    mcps: ${subtask.mcps}
    input: |
      Task: ${subtask.description}
      Branch: ${setup-git.output.branch_name}
      Worktree: ${setup-worktree.output.worktree_path}
      Codebase Context: ${design.output.codebase_context}
      Files to Create: ${subtask.files_create}
      Files to Modify: ${subtask.files_modify}
      Testing Strategy: ${subtask.testing_strategy}
      Acceptance Criteria: ${subtask.acceptance_criteria}
      Implementation Guidelines: ${design.output.implementation_guidelines}
    output_contract: implementation-result

  # Stage 6: Wave1 統合
  - id: integrate-wave1
    kind: fan_in
    from: ${implement-wave1.outputs}
    facets:
      persona: integrator
      policies: [coding-standards]
      instructions: [merge-implementations]
    output_contract: integration-result

  # Stage 7: Wave2 並列実装（条件付き）
  - id: implement-wave2
    kind: fan_out
    when: ${plan.output.has_wave2} == 'true'
    from: ${plan.output.wave2_subtasks}
    as: subtask
    max_parallel: 8
    facets:
      persona: ${subtask.persona}
      policies: [coding-standards, no-push, tdd]
      knowledge: [error-patterns]
      instructions: [${subtask.instruction}]
    skills: ${subtask.skills}
    mcps: ${subtask.mcps}
    input: |
      Task: ${subtask.description}
      Branch: ${setup-git.output.branch_name}
      Worktree: ${setup-worktree.output.worktree_path}
      Wave1 Result: ${integrate-wave1.output}
      Codebase Context: ${design.output.codebase_context}
      Files to Create: ${subtask.files_create}
      Files to Modify: ${subtask.files_modify}
      Testing Strategy: ${subtask.testing_strategy}
      Acceptance Criteria: ${subtask.acceptance_criteria}
      Implementation Guidelines: ${design.output.implementation_guidelines}
    output_contract: implementation-result

  # Stage 8: Wave2 統合（条件付き）
  - id: integrate-wave2
    kind: fan_in
    when: ${plan.output.has_wave2} == 'true'
    from: ${implement-wave2.outputs}
    facets:
      persona: integrator
      policies: [coding-standards]
      instructions: [merge-implementations]
    output_contract: integration-result

  # Stage 9: AIアンチパターンレビュー（arbitrate省略 — ai-fix の判断を信頼）
  - id: ai-review
    kind: task
    facets:
      persona: ai-antipattern-reviewer
      policies: [ai-antipattern]
      instructions: [ai-review]
    input: |
      Design: ${design.output}
      Plan: ${plan.output}
      Implementation: ${integrate-wave1.output}
    output_contract: ai-review-result
    permission: default
    next:
      - when: ${ai-review.output.verdict} == 'APPROVE'
        goto: quality-gate
      - when: ${ai-review.output.verdict} == 'REJECT'
        goto: ai-fix

  # Stage 10: AI指摘修正
  - id: ai-fix
    kind: task
    facets:
      persona: ${plan.output.wave1_subtasks[0].persona}
      policies: [coding-standards, no-push]
      instructions: [ai-fix]
    input: |
      AI Review Result: ${ai-review.output}
      Design: ${design.output}
    output_contract: ai-fix-result
    next:
      - when: ${ai-fix.output.action} == 'no_fix_needed'
        goto: quality-gate
      - when: ${ai-fix.output.action} == 'fixed'
        goto: ai-review
      - when: ${ai-fix.output.action} == 'partial'
        goto: ai-review

  # Stage 11: 品質ゲート
  - id: quality-gate
    kind: task
    facets:
      persona: qa-engineer
      policies: [tdd]
      instructions: [run-quality-checks]
    input: |
      Design: ${design.output}
      Plan: ${plan.output}
      Implementation: ${integrate-wave1.output}
    output_contract: quality-result

  # Stage 12: 5軸コードレビュー（standardでも残す — 中規模では必要）
  - id: review
    kind: task
    facets:
      persona: code-reviewer
      rubrics: [performance, naming, testing, security, design]
      instructions: [code-review-5axis]
    input: |
      Design: ${design.output}
      Plan: ${plan.output}
      Quality Gate: ${quality-gate.output}
    output_contract: dev-review-verdict
    permission: default
    next:
      - when: ${review.output.grade} >= 'A+'
        goto: save-results

  # Stage 13: レビュー指摘の修正
  - id: fix
    kind: task
    facets:
      persona: ${plan.output.wave1_subtasks[0].persona}
      policies: [coding-standards, no-push]
      rubrics: [performance, naming, testing, security, design]
      instructions: [apply-fixes-and-self-assess]
    input: |
      Review Result: ${review.output}
    output_contract: fix-verdict
    next:
      - when: ${fix.output.grade} >= 'A+'
        goto: save-results
      - when: ${fix.output.grade} < 'A+'
        goto: review

  # Stage 14: レビュー結果保存 + ログ
  - id: save-results
    kind: task
    facets:
      persona: project-manager
      knowledge: [error-patterns]
      instructions: [save-review-and-log]
    input: |
      Task: ${workflow.inputs.task}
      Design: ${design.output}
      Plan: ${plan.output}
      Review: ${review.output}
    output_contract: save-result

  # Stage 15: push + PR作成
  - id: finalize
    kind: task
    gate: approval
    facets:
      persona: project-manager
      policies: [git-conventions]
      instructions: [push-pr-report]
    input: |
      Task: ${workflow.inputs.task}
      Design: ${design.output}
      Git Setup: ${setup-git.output}
      Review Grade: ${review.output.grade}
      Quality: ${quality-gate.output}
    output_contract: completion-report
